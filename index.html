<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9E5YY8PP0B"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-9E5YY8PP0B');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Image Cleaner - 在线 AI 图片清理工具 (无需Python)</title>
    
    <meta name="description" content="Aether Image Cleaner 是一个在线 AI 图片清理工具，支持智能修复、裁剪清理和画质增强。纯前端本地处理，无需上传服务器。">
    <meta name="keywords" content="AI图片清理, 图片去水印, 在线修图, OpenCV.js, 本地图片处理, 图片修复">
    <meta name="author" content="Aether Image Cleaner">
    
    <meta property="og:title" content="Aether Image Cleaner - 图片清理工具">
    <meta property="og:description" content="一键清理干扰区域，智能修复背景，纯本地处理。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/Ylim314/aether-image-cleaner">
    <meta property="og:image" content="https://github.com/Ylim314/aether-image-cleaner">

    <link rel="stylesheet" href="css/style.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Aether Image Cleaner",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "CNY"
      },
      "url": "https://github.com/Ylim314/aether-image-cleaner",
      "description": "基于浏览器的图片清理、修复与画质增强工具。"
    }
    </script>
</head>
<body>

<main class="container">
    <header>
        <h1>Aether 图片清理工具 <span class="badge">PRO</span></h1>
        <p class="subtitle">智能识别周围纹理，实现无痕修复 (本地引擎版)</p>
    </header>

    <div id="ai-status" class="status-bar loading">
        <span class="spinner"></span> 正在初始化本地 AI 引擎... (首次加载需几秒)
    </div>

    <section id="drop-zone">
        <div class="icon-upload">📁</div>
        <p>点击或拖拽图片到这里</p>
        <span class="file-info">支持 JPG / PNG / WebP，最大 20MB</span>
        <div id="upload-warning" class="message message-warning" style="display: none;"></div>
        <div id="upload-error" class="message message-error" style="display: none;"></div>
        <div id="file-meta" class="file-meta" style="display: none;"></div>
        <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp" hidden>
    </section>

    <section class="workspace" id="workspace" style="display: none;">
        <div class="canvas-wrapper">
            <canvas id="main-canvas"></canvas>
            <div id="selection-box"></div>
        </div>

        <aside class="controls">
            <div id="process-status" class="status-inline" style="display: none;"></div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="crop">✂️ 裁剪</button>
                <button class="tab-btn" data-tab="inpaint">🖌️ 智能修补</button>
                <button class="tab-btn" data-tab="enhance">✨ 画质增强</button>
            </div>

            <div id="tab-crop" class="tab-panel active">
                <div class="control-group">
                    <label>底部切除高度: <span id="crop-val">40px</span></label>
                    <input type="range" id="crop-slider" min="0" max="200" value="40">
                </div>
                <button class="btn btn-primary" id="btn-apply-crop">应用裁剪</button>
                <p class="desc">最安全的去水印方式，直接切除底部文字区域。</p>
            </div>

            <div id="tab-inpaint" class="tab-panel">
                <div class="alert-box">
                    <strong>使用说明：</strong> 在左侧图片上框选水印区域，算法将分析周围纹理进行覆盖。
                </div>
                <div class="control-group">
                    <label>修复半径: <span id="radius-val">3px</span></label>
                    <input type="range" id="radius-slider" min="1" max="20" value="3">
                </div>
                <button class="btn btn-primary" id="btn-apply-inpaint" disabled>执行智能修复</button>
            </div>

            <div id="tab-enhance" class="tab-panel">
                <div class="control-group">
                    <label>锐化强度: <span id="sharp-val">0.5</span></label>
                    <input type="range" id="sharp-slider" min="0" max="20" value="5">
                </div>
                <button class="btn btn-primary" id="btn-apply-enhance">应用 USM 锐化</button>
            </div>

            <div class="export-options">
                <div class="control-group">
                    <label for="export-format">导出格式</label>
                    <select id="export-format">
                        <option value="png">PNG (无损)</option>
                        <option value="jpeg">JPG (更小)</option>
                        <option value="webp">WebP (更小)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="export-quality">导出质量: <span id="export-quality-val">92%</span></label>
                    <input type="range" id="export-quality" min="10" max="100" value="92">
                </div>
            </div>

            <div class="global-actions">
                <button class="btn btn-secondary" id="btn-compare-toggle" disabled>👁 对比开关</button>
                <button class="btn btn-secondary" id="btn-compare-hold" disabled>按住看原图</button>
                <button class="btn btn-secondary" id="btn-undo" disabled>↶ 撤销</button>
                <button class="btn btn-secondary" id="btn-redo" disabled>↷ 重做</button>
                <button class="btn btn-secondary" id="btn-reset">↺ 重置</button>
                <button class="btn btn-success" id="btn-download">💾 保存图片</button>
            </div>
        </aside>
    </section>
</main>

<script async src="js/opencv.js" onload="onOpenCvReady()" onerror="onOpenCvError()" type="text/javascript"></script>
<script src="js/processor.js"></script>
<script src="js/app.js"></script>

<script>
    window.cvReady = false;
    window.__opencvRetries = 0;
    const MAX_OPENCV_RETRIES = 1;

    function appendOpenCvScript() {
        const script = document.createElement('script');
        script.async = true;
        script.src = `js/opencv.js?retry=${Date.now()}`;
        script.onload = onOpenCvReady;
        script.onerror = onOpenCvError;
        document.body.appendChild(script);
    }

    function manualRetryOpenCv() {
        window.__opencvRetries = 0;
        const status = document.getElementById('ai-status');
        status.className = 'status-bar loading';
        status.innerHTML = '<span class="spinner"></span> 正在重新加载本地 AI 引擎...';
        appendOpenCvScript();
    }

    function onOpenCvReady() {
        if (typeof cv !== 'undefined' && cv.getBuildInformation) {
            console.log('Local OpenCV Loaded Successfully');
            document.getElementById('ai-status').className = 'status-bar ready';
            document.getElementById('ai-status').innerHTML = '✅ 本地 AI 引擎已就绪';
            window.cvReady = true;
        } else {
            setTimeout(onOpenCvReady, 100);
        }
    }
    
    function onOpenCvError() {
        window.cvReady = false;
        const status = document.getElementById('ai-status');

        if (window.__opencvRetries < MAX_OPENCV_RETRIES) {
            window.__opencvRetries += 1;
            status.className = 'status-bar loading';
            status.innerHTML = `<span class="spinner"></span> OpenCV 加载失败，正在重试 (${window.__opencvRetries}/${MAX_OPENCV_RETRIES})...`;
            setTimeout(() => appendOpenCvScript(), 500);
            return;
        }

        status.className = 'status-bar error';
        status.innerHTML = '❌ OpenCV 加载失败。<button class="btn-inline" onclick="manualRetryOpenCv()">重试</button>';
    }
</script>

</body>
</html>
